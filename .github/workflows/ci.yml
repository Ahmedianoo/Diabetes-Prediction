name: TODO Workflow

on: ["push", "pull_request", "workflow_dispatch"]

jobs:
  todo-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run all
        run: make all

